[[repos]]
repo = "builtin"
[[repos.hooks]]
id = "no-commit-to-branch"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-xml"

[[repos.hooks]]
id = "check-added-large-files"

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "mixed-line-ending"

[[repos.hooks]]
id = "detect-private-key"

[[repos]]
repo = "local"
[[repos.hooks]]
entry = "shellcheck"
files = "\\.sh$"
id = "shellcheck"
language = "system"
name = "shellcheck"

[[repos.hooks]]
entry = "nixfmt"
files = "\\.nix$"
id = "nixfmt"
language = "system"
name = "nixfmt"

[[repos.hooks]]
entry = "statix fix"
id = "statix"
language = "system"
name = "statix"
pass_filenames = false

[[repos.hooks]]
entry = "deadnix --edit"
files = "\\.nix$"
id = "deadnix"
language = "system"
name = "deadnix"

[[repos.hooks]]
entry = "sh -c 'nix run .#sync-prek && git diff --exit-code prek.toml'"
files = "^(prek\\.toml|packages/code-quality-tools/.*\\.nix|flake\\.nix|nix/prek-toml\\.nix)$"
id = "prek-toml-up-to-date"
language = "system"
name = "prek-toml-up-to-date"
pass_filenames = false
