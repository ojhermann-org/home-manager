[[repos]]
repo = "builtin"
[[repos.hooks]]
id = "no-commit-to-branch"

[[repos.hooks]]
id = "trailing-whitespace"

[[repos.hooks]]
id = "end-of-file-fixer"

[[repos.hooks]]
id = "check-merge-conflict"

[[repos.hooks]]
id = "check-toml"

[[repos.hooks]]
id = "check-json"

[[repos.hooks]]
id = "check-yaml"

[[repos.hooks]]
id = "check-xml"

[[repos.hooks]]
id = "check-added-large-files"

[[repos.hooks]]
id = "check-case-conflict"

[[repos.hooks]]
id = "mixed-line-ending"

[[repos.hooks]]
id = "detect-private-key"

[[repos]]
repo = "local"
[[repos.hooks]]
entry = "shellcheck"
files = "\\.sh$"
id = "shellcheck"
language = "system"
name = "shellcheck"

[[repos.hooks]]
entry = "shfmt -w -i 2"
files = "\\.sh$"
id = "shfmt"
language = "system"
name = "shfmt"

[[repos.hooks]]
entry = "kdlfmt format"
files = "\\.kdl$"
id = "kdlfmt"
language = "system"
name = "kdlfmt"

[[repos.hooks]]
entry = "prettier --write"
files = "\\.md$"
id = "prettier"
language = "system"
name = "prettier"

[[repos.hooks]]
entry = "nixfmt"
files = "\\.nix$"
id = "nixfmt"
language = "system"
name = "nixfmt"

[[repos.hooks]]
entry = "statix fix"
id = "statix"
language = "system"
name = "statix"
pass_filenames = false

[[repos.hooks]]
entry = "deadnix --edit"
files = "\\.nix$"
id = "deadnix"
language = "system"
name = "deadnix"

[[repos.hooks]]
entry = "terraform-docs markdown table . --recursive --output-file README.md --output-mode inject --output-check"
files = "\\.tf$"
id = "terraform-docs"
language = "system"
name = "terraform-docs"
pass_filenames = false

[[repos.hooks]]
entry = "tflint --recursive"
files = "\\.tf$"
id = "tflint"
language = "system"
name = "tflint"
pass_filenames = false

[[repos.hooks]]
entry = "taplo format"
exclude = "^prek\\.toml$"
files = "\\.toml$"
id = "taplo"
language = "system"
name = "taplo"

[[repos.hooks]]
entry = "yamlfmt -formatter retain_line_breaks=true"
files = "\\.ya?ml$"
id = "yamlfmt"
language = "system"
name = "yamlfmt"

[[repos.hooks]]
entry = "sh -c 'nix run .#sync-prek && git diff --exit-code prek.toml'"
files = "^(prek\\.toml|packages/code-quality-tools/.*\\.nix|flake\\.nix|nix/prek-toml\\.nix)$"
id = "prek-toml-up-to-date"
language = "system"
name = "prek-toml-up-to-date"
pass_filenames = false
